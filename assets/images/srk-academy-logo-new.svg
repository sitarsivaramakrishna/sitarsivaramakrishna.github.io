<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 420" width="320" height="420">
  <!-- Elegant Vertical — cream background with gold borders and maroon sitar -->
  <rect width="320" height="420" fill="#FDF6E3"/>
  <rect x="8" y="8" width="304" height="404" fill="none" stroke="#C9A84C" stroke-width="2" rx="4"/>
  <rect x="14" y="14" width="292" height="392" fill="none" stroke="#C9A84C" stroke-width="0.5" rx="2"/>

  <!-- Top ornament -->
  <g transform="translate(160,36)" fill="#C9A84C" text-anchor="middle">
    <line x1="-60" y1="0" x2="-15" y2="0" stroke="#C9A84C" stroke-width="1"/>
    <text x="0" y="5" font-family="Georgia,serif" font-size="14" letter-spacing="2">&#10045;</text>
    <line x1="15" y1="0" x2="60" y2="0" stroke="#C9A84C" stroke-width="1"/>
  </g>

  <!-- Sitar (maroon on cream) -->
  <g transform="translate(110,48) scale(1.0)">
    <!-- Gourd -->
    <ellipse cx="50" cy="245" rx="36" ry="30" fill="#6B0F1A"/>
    <!-- Neck + headstock -->
    <path d="M 41,217 L 43,55 Q 50,25 57,55 L 59,217 Z" fill="#6B0F1A"/>
    <!-- Bridge -->
    <rect x="44" y="230" width="12" height="3" rx="1" fill="#C9A84C"/>
    <!-- Main tuning pegs — right -->
    <g stroke="#6B0F1A" stroke-width="2.8" stroke-linecap="round">
      <line x1="57" y1="58" x2="72" y2="58"/>
      <line x1="57" y1="72" x2="72" y2="72"/>
      <line x1="57" y1="86" x2="72" y2="86"/>
    </g>
    <!-- Main tuning pegs — left -->
    <g stroke="#6B0F1A" stroke-width="2.8" stroke-linecap="round">
      <line x1="43" y1="65" x2="28" y2="65"/>
      <line x1="43" y1="79" x2="28" y2="79"/>
    </g>
    <!-- Sympathetic string pegs -->
    <g stroke="#6B0F1A" stroke-width="2" stroke-linecap="round">
      <line x1="59" y1="115" x2="68" y2="115"/>
      <line x1="59" y1="145" x2="68" y2="145"/>
      <line x1="59" y1="175" x2="68" y2="175"/>
    </g>
    <!-- Strings -->
    <g stroke="#C9A84C" stroke-width="0.6">
      <line x1="47" y1="45" x2="47" y2="232"/>
      <line x1="50" y1="45" x2="50" y2="232"/>
      <line x1="53" y1="45" x2="53" y2="232"/>
    </g>
    <!-- Frets -->
    <g stroke="#C9A84C" stroke-width="1">
      <line x1="42" y1="100" x2="58" y2="100"/>
      <line x1="42" y1="130" x2="58" y2="130"/>
      <line x1="42" y1="160" x2="58" y2="160"/>
      <line x1="42" y1="190" x2="58" y2="190"/>
    </g>
  </g>

  <!-- Bottom ornament -->
  <g transform="translate(160,340)" fill="#C9A84C">
    <line x1="-80" y1="0" x2="-15" y2="0" stroke="#C9A84C" stroke-width="1"/>
    <text x="0" y="5" font-family="Georgia,serif" font-size="14" text-anchor="middle" letter-spacing="2">&#10045;</text>
    <line x1="15" y1="0" x2="80" y2="0" stroke="#C9A84C" stroke-width="1"/>
  </g>

  <!-- Text -->
  <text x="160" y="370" fill="#6B0F1A" font-family="Georgia,'Times New Roman',serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="4">SRK</text>
  <text x="160" y="395" fill="#C9A84C" font-family="Georgia,'Times New Roman',serif" font-size="13" text-anchor="middle" letter-spacing="5">ACADEMY OF MUSIC</text>
</svg>
