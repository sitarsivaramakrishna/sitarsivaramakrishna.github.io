<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#6B0F1A"/>
  <circle cx="32" cy="32" r="27" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <!-- Stylized sitar neck (vertical line with frets) -->
  <line x1="32" y1="10" x2="32" y2="50" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Fret marks -->
  <line x1="28" y1="18" x2="36" y2="18" stroke="#C9A84C" stroke-width="1" opacity="0.7"/>
  <line x1="28" y1="24" x2="36" y2="24" stroke="#C9A84C" stroke-width="1" opacity="0.7"/>
  <line x1="28" y1="30" x2="36" y2="30" stroke="#C9A84C" stroke-width="1" opacity="0.7"/>
  <!-- Tumba (gourd) at bottom -->
  <ellipse cx="32" cy="48" rx="10" ry="7" fill="#C9A84C" opacity="0.9"/>
  <ellipse cx="32" cy="48" rx="7" ry="4.5" fill="#6B0F1A" opacity="0.5"/>
  <!-- Headstock at top -->
  <circle cx="32" cy="10" r="4" fill="#C9A84C" opacity="0.9"/>
  <circle cx="32" cy="10" r="2" fill="#6B0F1A"/>
  <!-- Tuning pegs -->
  <line x1="28" y1="8" x2="25" y2="6" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="12" x2="25" y2="14" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="8" x2="39" y2="6" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="12" x2="39" y2="14" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Strings (subtle) -->
  <line x1="30" y1="14" x2="30" y2="44" stroke="#E8D5A3" stroke-width="0.5" opacity="0.5"/>
  <line x1="34" y1="14" x2="34" y2="44" stroke="#E8D5A3" stroke-width="0.5" opacity="0.5"/>
</svg>
